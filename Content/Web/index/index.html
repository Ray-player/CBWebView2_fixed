<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
        transform-origin: 0 0;
    }
    .main{
        display: flex;
        flex-direction: row;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0);
    }
    .ruler-top{
        display: flex;
        position: absolute;
        top: 0;
        width: 100%;
        height: 10%;
        background-color: rgba(0, 153, 255, 0.3);
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
    .ruler-left{
        display: flex;
        position: absolute;
        top: 10%;
        width: 25%;
        height: 90%;
        background-color: rgba(0, 153, 255, 0.3);
        justify-content: center;
        align-items: center;
    }
    .ruler-right{
        display: flex;
        position: absolute;
        right: 0;
        top: 10%;
        width: 25%;
        height: 90%;
        background-color: rgba(0, 153, 255, 0.3);
        justify-content: center;
        align-items: center;
    }
</style>

<body>
<div class="main">
    <div class="ruler-top">
        <input type="text" id="textInput" style="width: 60%; height: 30%;" placeholder="请输入文本">
        <button onclick="buttonCall()" style="position: relative; top: 10% ;padding:3px;">点我向UE发送输入文本</button>
    </div>
    <div class="ruler-left">左侧</div>
    <div class="ruler-right">右侧</div>
</div>
</body>

</html>
<script src="ruler.js"></script>
